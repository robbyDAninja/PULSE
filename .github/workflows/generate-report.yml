name: Generate OpenClaw Ecosystem Pulse

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python generate_pulse.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push report
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "new_report=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Add OpenClaw Ecosystem Pulse — $(date +%Y-%m-%d)"
            git push
            echo "new_report=true" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        if: steps.commit.outputs.new_report == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PULSE_WEBHOOK_SECRET: ${{ secrets.PULSE_WEBHOOK_SECRET }}
        run: |
          REPORT_FILE=$(ls -t reports/*.md | head -1)
          REPORT_DATE=$(basename "$REPORT_FILE" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
          REPORT_CONTENT=$(cat "$REPORT_FILE")

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/send-pulse-email" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "report_markdown": $(echo "$REPORT_CONTENT" | jq -Rs .),
            "report_date": "$REPORT_DATE",
            "subject": "OpenClaw Ecosystem Pulse — $REPORT_DATE",
            "webhook_secret": "${PULSE_WEBHOOK_SECRET}"
          }
          EOF
          )

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Email notification failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "Email sent successfully: $BODY"

      - name: Alert Slack on notification failure
        if: failure() && steps.commit.outputs.new_report == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"channel\": \"C0A6NNXEEJG\",
              \"text\": \":warning: OpenClaw Pulse email notification failed. Check GitHub Actions run: ${RUN_URL}\"
            }"
