name: Generate OpenClaw Ecosystem Pulse

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Deep Pulse report
        run: python generate_pulse.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push report
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "new_report=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Add OpenClaw Ecosystem Pulse — $(date +%Y-%m-%d)"
            git push
            echo "new_report=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate Discovery Layer
        id: discovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python generate_discovery.py --output discovery_payload.json
          if [ -f discovery_payload.json ]; then
            echo "has_discovery=true" >> $GITHUB_OUTPUT
          else
            echo "has_discovery=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Pattern Analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_patterns.py --output patterns.md

      - name: Send combined email
        if: steps.commit.outputs.new_report == 'true' || steps.discovery.outputs.has_discovery == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PULSE_WEBHOOK_SECRET: ${{ secrets.PULSE_WEBHOOK_SECRET }}
        run: |
          REPORT_DATE=$(date +%Y-%m-%d)

          # Build report markdown: patterns + deep pulse combined
          REPORT_MD=""
          if [ -f patterns.md ] && [ -s patterns.md ]; then
            PATTERNS=$(cat patterns.md)
            REPORT_MD="$PATTERNS"
          fi

          if [ "${{ steps.commit.outputs.new_report }}" = "true" ]; then
            REPORT_FILE=$(ls -t reports/*.md | head -1)
            REPORT_DATE=$(basename "$REPORT_FILE" | grep -oE '^[0-9]{4}-[0-9]{2}-[0-9]{2}')
            PULSE=$(cat "$REPORT_FILE")
            if [ -n "$REPORT_MD" ]; then
              REPORT_MD="$REPORT_MD

---

$PULSE"
            else
              REPORT_MD="$PULSE"
            fi
          fi

          # Build discovery layer
          DISCOVERY="null"
          if [ -f discovery_payload.json ]; then
            DISCOVERY=$(cat discovery_payload.json)
          fi

          # Encode and send
          REPORT_MD_JSON=$(echo "$REPORT_MD" | jq -Rs .)

          PAYLOAD=$(jq -n \
            --argjson report_markdown "$REPORT_MD_JSON" \
            --arg report_date "$REPORT_DATE" \
            --arg subject "Bridge Ninja Intelligence — $REPORT_DATE" \
            --arg webhook_secret "${PULSE_WEBHOOK_SECRET}" \
            --argjson discovery_layer "$DISCOVERY" \
            '{report_markdown: $report_markdown, report_date: $report_date, subject: $subject, webhook_secret: $webhook_secret, discovery_layer: $discovery_layer}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${SUPABASE_URL}/functions/v1/send-pulse-email" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Email notification failed (HTTP $HTTP_CODE): $BODY"
            exit 1
          fi
          echo "Email sent successfully: $BODY"

      - name: Alert Slack on notification failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "${SLACK_BOT_TOKEN}" ]; then
            curl -s -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"channel\": \"C0A6NNXEEJG\",
                \"text\": \":warning: Intelligence email failed. Check: ${RUN_URL}\"
              }"
          fi
