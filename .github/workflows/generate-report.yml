name: Generate OpenClaw Ecosystem Pulse

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Deep Pulse report
        run: python generate_pulse.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push report
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "new_report=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Add OpenClaw Ecosystem Pulse — $(date +%Y-%m-%d)"
            git push
            echo "new_report=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate Discovery Layer
        id: discovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python generate_discovery.py --output discovery_payload.json
          if [ -f discovery_payload.json ]; then
            echo "has_discovery=true" >> $GITHUB_OUTPUT
          else
            echo "has_discovery=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Pattern Analysis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_patterns.py --output patterns.md

      - name: Send combined email
        if: steps.commit.outputs.new_report == 'true' || steps.discovery.outputs.has_discovery == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PULSE_WEBHOOK_SECRET: ${{ secrets.PULSE_WEBHOOK_SECRET }}
        run: python send_monday_email.py

      - name: Alert Slack on notification failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "${SLACK_BOT_TOKEN}" ]; then
            curl -s -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"channel\": \"C0A6NNXEEJG\",
                \"text\": \":warning: Intelligence email failed. Check: ${RUN_URL}\"
              }"
          fi
